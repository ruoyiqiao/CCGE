seed: -1

clip_observations: 5.0
clip_actions: 1.0

curiosity_model:
  emb_dim: 8
  ensemble_size: 5
  hidden_sizes:
  - 512
  - 256
  - 128
  model_type: prediction_error
  simhash_dim: 5
  code_dim: 16
  hash_hidden_dim: 512

setting:
  action_type: 'direct'
  sub_action_type: 'direct'
  action_clip: False
  grad_process: 'norm'
policy:
  norm_action: False
  action_scale: 1.0
  distengle: False
  pointnet_version: 'pt'
  hand_pcl: False
  pretrain_pointnet: False
  shared_pointnet: True
  finetune_pointnet: True
  points_per_object: 1024
  hand_joint_dim: 16
  hand_wrist_dim: 7
  hand_state_dim: 23
  pi_state_encoder_hid_sizes: [512,256]
  vf_state_encoder_hid_sizes: [512,256]
  pcl_feature_dim: 64
  activation: elu
  critic_mode: single

learn:
  agent_name: xarm_allegro_hand
  test: False
  resume: 0
  save_interval: 1000
  print_log: True
  sampler: random

  # rollout params
  max_iterations: 40000

  # training params
  normalize_input: True
  normalize_value: True
  cliprange: 0.1
  ent_coef: 0
  reward_scale_value: 0.01
  nsteps: 12
  noptepochs: 2
  nminibatches: 4
  max_grad_norm: 1
  optim_stepsize: 3.e-4
  schedule: adaptive
  desired_kl: 0.016
  gamma: 0.99
  lam: 0.95
  init_noise_std: 1.0

  log_interval: 1
  asymmetric: False