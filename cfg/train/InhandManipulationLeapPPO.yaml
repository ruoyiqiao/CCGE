seed: -1

clip_observations: 5.0
clip_actions: 1.0

setting:
  action_type: 'direct'
  sub_action_type: 'direct'
  action_clip: False #
  grad_process: 'norm'
  use_curiosity_model: False
policy: # only works for MlpPolicy right now
  norm_action: False
  action_scale: 1.0
  distengle: False
  pointnet_version: 'pt'
  hand_pcl: False
  pretrain_pointnet: False
  shared_pointnet: True
  finetune_pointnet: True
  points_per_object: 1024
  hand_joint_dim: 16
  hand_wrist_dim: 7
  hand_state_dim: 23
  pi_state_encoder_hid_sizes: [512,256,128]
  vf_state_encoder_hid_sizes: [512,256,128]
  pcl_feature_dim: 64
  activation: elu # can be elu, relu, selu, crelu, lrelu, tanh, sigmoid
curiosity_model:
  model_type: 'prediction_error' # can be 'rnd', 'prediction_error', 'disagreement', 'neural_hash'
  hidden_sizes: [512,256,128]
  ensemble_size: 5
  emb_dim: 8
  simhash_dim: 5
  code_dim: 16
  hash_hidden_dim: 512


learn:
  agent_name: xarm_leap_hand
  test: False
  resume: 0
  save_interval: 1000 # check for potential saves every this many iterations
  print_log: True
  sampler: random

  # rollout params
  max_iterations: 40000

  # training params
  normalize_input: True
  normalize_value: True
  value_bootstrap: True
  cliprange: 0.2 #0.2
  ent_coef: 0
  bounds_loss_coef: 0.0001
  reward_scale_value: 0.01
  intrinsic_reward_scale: 100.0
  nsteps: 8
  noptepochs: 5 #2 5
  nminibatches: 8 #8 4 # this is per agent
  max_grad_norm: 1
  optim_stepsize: 5.e-4 # 3e-4 is default for single agent training with constant schedule
  schedule: adaptive # could be adaptive or linear or fixed
  desired_kl: 0.016 #0.008 0.016
  gamma: 0.99 #0.99 0.96
  lam: 0.95
  init_noise_std: 1.0 #0.8

  log_interval: 1
  asymmetric: False
