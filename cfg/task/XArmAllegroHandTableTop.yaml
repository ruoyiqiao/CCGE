name: XArmAllegroHandTableTop

physics_engine: ${..physics_engine}

defaults:
  - env/observationSpecs: xarm_allegro
  # - env/curiosityObservationSpecs: xarm_allegro_curiosity
  - env/actionSpecs: xarm_allegro
  - domain_rand: domain_rand_base

env:
  seed: ${resolve_default:0,${...seed}}
  numEnvs: ${resolve_default:32,${...num_envs}}
  envSpacing: 0.75
  episodeLength: 300
  enableDebugVis: False
  renderTarget: False
  aggregateMode: 1

  mode: ${resolve_default:train,${...mode}}
  method: "ppo"

  clipObservations: 5.0
  clipActions: 1.0

  stiffnessScale: 1.0
  forceLimitScale: 1.0

  useRelativeControl: True
  useAbsoluteJointControl: False
  dofSpeedScale: 20.0
  actionsMovingAverage: 1.0
  # controlFrequencyInv: 2
  controlFrequencyInv: 4

  startPositionNoise: 0.01
  startRotationNoise: 0.0

  resetPositionNoise: 0.01
  resetRotationNoise: 0.0
  resetObjOriNoise: 0.0
  resetDofPosRandomInterval: 0.2
  resetDofVelRandomInterval: 0.0

  randomSceneXYOnReset: false
  randomSceneOrientationOnReset: true
  randomSceneOrientationMode: yaw   # or "full"

  actionNoise: False
  actionNoiseLevel: "step"
  actionNoiseRatio: 0.4
  actionNoiseSigma: 0.1
  actionNoiseMaxTimes: 0

  # Random forces applied to the object
  forceScale: 50.0
  torqueScale: 100.0
  wrenchProb: 0.1
  forceProbRange: [0.001, 0.1]
  forceDecay: 0.99
  forceDecayInterval: 0.08

  # hand qpose
  handType: "allegro"

  # reward -> dictionary
  rewardType: ${resolve_default:succrew+tilt+slide+neighbor+stability+actionpen,${...reward_type}}
  relativePartReward: False
  distRewardScale: -10.0
  rotRewardScale: 1.0
  tranRewardScale: 1.0
  contactRewardScale: 1.0
  partRewardScale: 0.3
  heightRewardScale: 0.5
  rotEps: 0.1
  contactEps: 0.2
  actionPenaltyScale: -0.0
  wristActionPenaltyScale: -0.0
  armActionPenaltyScale: -0.01
  similarityRewardScale: 1.0
  similarityRewardFreq: 1.0
  reachGoalBonus: 600
  heightScale: 0.0
  timeStepPenatly: -0.0
  manipulabilityPenaltyScale: 1.0
  fallDistance: 0.24
  fallPenalty: 0.0
  curriculumMode: "no"

  enableCuriosity: True
  curiosity:
    enable_occlusion: False
    enablePotentialCuriosity: true

  tiltRewardScale: 1.0
  slideRewardScale: 1.0
  neighborStabilityPenaltyScale: -5.0
  stabilityPenaltyScale: -2.0

  goalTranslationY: 0.05
  goalRotationX: -0.80
  goalTolerancePosition: 0.05
  goalToleranceRotation: 0.087

  successSteps: 60
  observationType: "full_state"

  enableContactSensors: True
  contactSensorThreshold: 0.005
  contactSensorFingertipOnly: False
  contactSensorFingertipFromAll: False

  # dataset filter
  datasetDir: "oakink_shadow_dataset_valid_force_noise_accept_1"
  datasetMetainfoPath: "data/oakink_filtered_metainfo.csv"
  datasetSkipcodePath: "data/oakink_skipcode.csv"
  datasetPoseLevelSampling: True
  datasetQueries:
    split: ${resolve_default:null,${....split}}
    cluster: ${resolve_default:null,${....cluster}}
    code: ${resolve_default:null,${....code}}

  observationSpace:
    ${resolve_default:[],${...obs_space}}

  observationSpaceExtra:
    # - object_position
    # - rendered_pointcloud

  enableRenderedPointCloud: False
  numRenderedPointCloudPoints: 1024
  renderedPointCloudMultiplier: 8
  renderedPointCloudSampleMethod: "farthest"
  renderedPointCloudGaussianNoise: False
  renderedPointCloudGaussianNoiseSigma: 0.004
  renderedPointCloudGaussianNoiseRatio: 0.4

  enableImaginedPointCloud: False
  numImaginedPointCloudPoints: 512

  numObjectPointCloudPoints: 512

  enableRenderedPointCloudTargetMask: False

  pclObs: False
  realPclObs: False
  imgPclObs: False
  tactileObs: False
  stackFrameNumber: ${resolve_default:1,${...stack_frame_number}}
  velocityObservationScale: 0.2
  actionSpace:
    ${resolve_default:[],${...action_space}}

  # Object counts and spacing
  numObjects: ${resolve_default:1,${...num_objects}}
  numObjectsPerEnv: ${resolve_default:1,${...num_objects_per_env}}
  objectSpacing: 0.15
  resampleObject: ${resolve_default:False,${...resample_object}}

  asymmetric_observations: False
  successTolerance: 0.1
  printNumSuccesses: False
  maxConsecutiveSuccesses: 100

  # camera
  enableCameraSensors: False
  visEnvNum: 0
  visImageSize: 512

  goalPosition: [0.0, 0.0, 0.35]
  goalPositionDistMin: 0.25

  # ---------------- TableTop-specific scene options ----------------
  # Table scene 
  useBackWall: False
  useSideWalls: False
  useUpperShelf: False
  tableNoCollision: True

  # Object mode: "cube" or "urdf"
  objectMode: urdf # urdf
  objectUrdfPath: "oakink/headphones_s103/decomposed.urdf"

  # Cube dimensions (meters)
  cubeWidth: 0.12
  cubeLength: 0.08
  cubeHeight: 0.08

  # Placement (for cube); URDF objects placed at table center
  placeSide: center   # left | right | back | center
  edgeMargin: 0.001

  # Optional walls 
  wallLeft: False
  wallRight: False
  wallBack: True
  wallThickness: 0.01
  wallHeight: 0.15
  wallColor: [0.25, 0.25, 0.25]

logging:
  envInfo: ${resolve_default:False,${...env_info}}

task:
  randomize: False
  randomization_params:
    frequency: 300   # refresh correlated noise once per episode (episodeLength=300)
    observations:
      range: [0.0, 0.005]
      range_correlated: [0.0, 0.01]
      operation: "additive"
      distribution: "gaussian"
    actions:
      range: [0.0, 0.05]
      range_correlated: [0.0, 0.02]
      operation: "additive"
      distribution: "gaussian"
    sim_params:
      gravity:
        range: [0.0, 0.5]
        operation: "additive"
        distribution: "gaussian"
    actor_params:
      allegro_hand:
        color: True
        dof_properties:
          stiffness:
            range: [0.5, 2.0]
            operation: "scaling"
            distribution: "loguniform"
          damping:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "loguniform"
        rigid_body_properties:
          mass:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 8
            range: [0.5, 1.1]
            operation: "scaling"
            distribution: "uniform"
          restitution:
            num_buckets: 8
            range: [0.0, 0.4]
            operation: "additive"
            distribution: "uniform"
      targ_obj:
        rigid_body_properties:
          mass:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 8
            range: [0.5, 1.1]
            operation: "scaling"
            distribution: "uniform"
          restitution:
            num_buckets: 4
            range: [0.0, 0.4]
            operation: "additive"
            distribution: "uniform"
      table:
        rigid_shape_properties:
          friction:
            num_buckets: 8
            range: [0.5, 1.1]
            operation: "scaling"
            distribution: "uniform"
          restitution:
            num_buckets: 4
            range: [0.0, 0.4]
            operation: "additive"
            distribution: "uniform"

sim:
  dt: 0.01667
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}}
    num_position_iterations: 8
    num_velocity_iterations: 0
    max_gpu_contact_pairs: 8388608
    num_subscenes: ${....num_subscenes}
    contact_offset: 0.002
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000.0
    default_buffer_size_multiplier: 5.0
    contact_collection: 1