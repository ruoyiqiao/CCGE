  taskConfig:
    description: "Right hand twists the bottle lid while left hand stabilises the bottle body."
    distanceRewardScale: 2.5
    successSteps: 60
    successBonus: 600.0
    terminateOnSuccess: True
    curiosityRewardScale: 0.5
    targets:
      right:
        actor: bottle_cap
        body: link_0
        successThreshold: 0.045
      left:
        actor: bottle_cap
        body: link_1
        successThreshold: 0.055

  observationSpace:
    ${resolve_default:[],${...obs_space}}

  observationSpaceExtra:

  # observationSpace:
  #   - rh_root_pose
  #   - rh_root_velocity
