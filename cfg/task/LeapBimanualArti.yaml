name: LeapBimanualArti

physics_engine: ${..physics_engine}

defaults:
  - env/observationSpecs: leap_bimanual
  - env/actionSpecs: leap_bimanual

env:
  seed: ${resolve_default:0,${...seed}}
  numEnvs: ${resolve_default:2048,${...num_envs}}
  envSpacing: 0.8
  episodeLength: 300
  enableDebugVis: False
  aggregateMode: 1

  clipObservations: 5.0
  clipActions: 1.0

  actionsMovingAverage: 0.8
  # controlFrequencyInv: 2
  controlFrequencyInv: 4

  useRelativeControl: True
  useAbsoluteJointControl: False
  # maxEefTranslationSpeed: 1.0
  # maxEefRotationSpeed: 12.566 # torch.pi * 4
  maxEefTranslationSpeed: 0.4
  maxEefRotationSpeed: 1.57 # torch.pi * 4
    
  usePIDControl: False

  rootControlDim: 9
  translationScale: 1.0
  orientationScale: 1.0
  fingerActionScale: 20.0
  fingerStiffness: 3.0
  fingerDamping: 0.1
  distanceRewardScale: 2.5
  successSteps: 60
  terminateOnSuccess: True

  rewardType: ${resolve_default:succrew+rotrew+actionpen+mutual+fjcontact,${...reward_type}}

