__dim__:
  num_fingers: 4  # Allegro hand has 4 fingertips
  num_degrees_of_freedom: 16  # Allegro hand (16)

  num_object_points: ${...numObjectPointCloudPoints}
  num_fingertips: 4
  num_keypoints: 12  # Updated for Allegro hand keypoints
  num_actions: num_actions

##################################################
# Allegro hand
##################################################

allegro_hand_dof_position:
  shape: 16  # Allegro hand has 16 DOF
  attr: allegro_hand_dof_positions
  tags: ["dof", "position"]

allegro_hand_dof_velocity:
  shape: 16  # Allegro hand has 16 DOF
  attr: allegro_hand_dof_velocities
  tags: ["velocity"]

allegro_hand_dof_force:
  shape: 16  # Allegro hand has 16 DOF
  attr: allegro_hand_dof_forces
  tags: ["force"]

##################################################
# Fingers
##################################################

fingertip_position:
  shape: [num_fingers, 3]
  attr: fingertip_positions

fingertip_orientation:
  shape: [num_fingers, 4]
  attr: fingertip_orientations
  tags: ["orientation"]

fingertip_position_wrt_palm:
  shape: [num_fingers, 3]
  attr: fingertip_positions_wrt_palm

fingertip_orientation_wrt_palm:
  shape: [num_fingers, 4]
  attr: fingertip_orientations_wrt_palm

fingertip_linear_velocity:
  shape: [num_fingers, 3]
  attr: fingertip_linear_velocities

fingertip_angular_velocity:
  shape: [num_fingers, 3]
  attr: fingertip_angular_velocities

##################################################
# Object
##################################################

object_position:
  shape: 3
  attr: object_root_positions

object_orientation:
  shape: 4 # 6
  attr: object_root_orientations
  tags: ["orientation"]

goal_position:
  shape: 3
  attr: goal_pos

goal_orientation:
  shape: 4 # 6
  attr: goal_rot
  tags: ["orientation"]

goal_orientation_dist:
  shape: 4 # 6
  attr: goal_ori_dist
  tags: ["orientation"]

object_linear_velocity:
  shape: 3
  attr: object_root_linear_velocities

object_angular_velocity:
  shape: 3
  attr: object_root_angular_velocities

object_position_wrt_palm:
  shape: 3
  attr: object_positions_wrt_palm

object_orientation_wrt_palm:
  shape: 6
  attr: object_orientations_wrt_palm
  tags: ["orientation"]

##################################################
# Pointclouds
##################################################

object_pointcloud:
  shape: [num_object_points, 3]
  attr: object_pointclouds

hand_object_pc_dist:
  shape: num_keypoints
  attr: hand_object_pc_distances

##################################################
# Actions
##################################################

action:
  shape: num_actions
  attr: actions
